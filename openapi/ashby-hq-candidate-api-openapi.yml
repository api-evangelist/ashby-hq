    post:
      summary: candidate.uploadResume
      operationId: candidateUploadResume
      description: 'Uploads a candidate''s resume, parses it, and updates their information.


        **Requires the [`candidatesWrite`](authentication#permissions-candidateuploadresume) permission.**


        **Recommended: Presigned upload handle**

        Use `file.createFileUploadHandle` with `fileUploadContext: "CandidateResume"` to get a presigned URL. Upload the file directly to that URL, then call this endpoint with the returned `resumeHandle`. This avoids sending file bytes through the API, improving upload reliability and reducing latency for large files.


        **Deprecated: Multipart upload**

        Send the resume as `multipart/form-data` with the file in a `resume` field. This mode is deprecated and may be removed in a future API version.


        Note: Existing candidate data always takes precedence over data found by parsing the resume. Resume data only populates candidate data, if it''s data that was missing in the candidate model.

        '
      tags:
      - Candidate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                candidateId:
                  allOf:
                  - $ref: '#/paths/~1interviewerPool.addUser/post/requestBody/content/application~1json/schema/properties/userId'
                  - description: The id of the candidate
                resumeHandle:
                  type: string
                  description: A handle returned by `file.createFileUploadHandle` after uploading a resume file to the presigned URL.
              required:
              - candidateId
              - resumeHandle
          multipart/form-data:
            schema:
              type: object
              properties:
                candidateId:
                  allOf:
                  - $ref: '#/paths/~1interviewerPool.addUser/post/requestBody/content/application~1json/schema/properties/userId'
                  - description: The id of the candidate
                resume:
                  type: string
                  format: binary
                  deprecated: true
                  description: 'Deprecated: Use `file.createFileUploadHandle` with `resumeHandle` instead. The resume to upload to the candidate''s profile.'
              required:
              - candidateId
              - resume
              example:
                candidateId: f9e52a51-a075-4116-a7b8-484deba69004
                resume: JVBERi0xLjQKJeLjz9MKMyAwIG9iago8PC9UeXBlL1BhZ2UvUGFyZW50I
      responses:
        '200':
          description: Responses from the candidate.uploadResume endpoint
          content:
            application/json:
              schema:
                oneOf:
                - title: Success response
                  allOf:
                  - $ref: '#/paths/~1job.info/post/responses/200/content/application~1json/schema/oneOf/0/allOf/0'
                  - type: object
                    properties:
                      results:
                        $ref: '#/paths/~1candidate.info/post/responses/200/content/application~1json/schema/oneOf/0/allOf/1/properties/results'
                    required:
                    - results
                - $ref: '#/paths/~1report.generate/post/responses/429/content/application~1json/schema'
components:
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
      description: HTTP Basic Auth. Send your Ashby API key as the username and leave the password blank.
    WebhookSignature:
      type: apiKey
      in: header
      name: Ashby-Signature
      description: HMAC-SHA256 signature of the webhook payload, used to verify webhook authenticity.
