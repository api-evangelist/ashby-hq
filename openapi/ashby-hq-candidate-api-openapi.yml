                    required:
                    - results
                - $ref: '#/paths/~1report.generate/post/responses/429/content/application~1json/schema'
  /candidate.update:
    post:
      summary: candidate.update
      operationId: candidateUpdate
      description: 'Updates an existing candidate


        **Requires the [`candidatesWrite`](authentication#permissions-candidateupdate) permission.**


        To set values for custom fields on Candidates, use the [`customFields.setValue`](https://developers.ashbyhq.com/reference/customfieldsetvalue) endpoint.

        '
      tags:
      - Candidate
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                candidateId:
                  allOf:
                  - $ref: '#/paths/~1interviewerPool.addUser/post/requestBody/content/application~1json/schema/properties/userId'
                  - description: The unique id of the candidate to update.
                name:
                  type: string
                  example: Adam Hart
                  description: The first and last name of the candidate to update.
                email:
                  allOf:
                  - $ref: '#/paths/~1candidate.create/post/requestBody/content/application~1json/schema/properties/email/allOf/0'
                  - description: Primary, personal email of the candidate to update.
                phoneNumber:
                  allOf:
                  - $ref: '#/paths/~1candidate.create/post/requestBody/content/application~1json/schema/properties/phoneNumber/allOf/0'
                  - description: Primary, personal phone number of the candidate to update.
                linkedInUrl:
                  $ref: '#/paths/~1candidate.create/post/requestBody/content/application~1json/schema/properties/linkedInUrl'
                githubUrl:
                  $ref: '#/paths/~1candidate.create/post/requestBody/content/application~1json/schema/properties/githubUrl'
                websiteUrl:
                  $ref: '#/paths/~1candidate.create/post/requestBody/content/application~1json/schema/properties/website'
                alternateEmail:
                  type: string
                  example: test.email@ashbyhq.com
                  description: An alternate email address to add to the candidate's profile.
                socialLinks:
                  description: "An array of social links to set on the candidate. This value replaces existing socialLinks that have been set on the candidate. \nIf this value is submitted along with linkedInUrl, gitHubUrl or websiteUrl fields, those values will be ignored.\n"
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        enum:
                        - LinkedIn
                        - GitHub
                        - Twitter
                        - Medium
                        - StackOverflow
                        - YouTube
                        - CodePen
                        - Website
                      url:
                        type: string
                    required:
                    - type
                    - url
                    example:
                      url: https://linkedin.com/in/user
                      type: LinkedIn
                sourceId:
                  allOf:
                  - $ref: '#/paths/~1interviewerPool.addUser/post/requestBody/content/application~1json/schema/properties/userId'
                  - description: The id of source for this candidate.
                creditedToUserId:
                  allOf:
                  - $ref: '#/paths/~1interviewerPool.addUser/post/requestBody/content/application~1json/schema/properties/userId'
                  - description: The id of the user the candidate will be credited to.
                location:
                  type: object
                  description: The location of the candidate.
                  properties:
                    $ref: '#/paths/~1candidate.create/post/requestBody/content/application~1json/schema/properties/location/properties'
                createdAt:
                  allOf:
                  - description: 'An ISO date string to set the candidate''s `createdAt` timestamp.

                      '
                  - $ref: '#/paths/~1candidate.createNote/post/requestBody/content/application~1json/schema/properties/createdAt'
                sendNotifications:
                  type: boolean
                  default: true
                  description: Whether or not users who are subscribed to the candidate should be notified that candidate was updated. Default is true.
              required:
              - candidateId
      responses:
        '200':
          description: Responses for the candidate.list endpoint
          content:
            application/json:
              schema:
                oneOf:
                - title: Success response
                  allOf:
                  - $ref: '#/paths/~1job.info/post/responses/200/content/application~1json/schema/oneOf/0/allOf/0'
                  - type: object
                    properties:
                      results:
                        $ref: '#/paths/~1candidate.info/post/responses/200/content/application~1json/schema/oneOf/0/allOf/1/properties/results'
                    required:
                    - results
                - $ref: '#/paths/~1report.generate/post/responses/429/content/application~1json/schema'
  /candidate.uploadFile:
    post:
      summary: candidate.uploadFile
      operationId: candidateUploadFile
      description: 'Uploads a file to attach to the candidate''s profile.


        **Requires the [`candidatesWrite`](authentication#permissions-candidateuploadfile) permission.**


        **Recommended: Presigned upload handle**

        Use `file.createFileUploadHandle` with `fileUploadContext: "CandidateFiles"` to get a presigned URL. Upload the file directly to that URL, then call this endpoint with the returned `fileHandle`. This avoids sending file bytes through the API, improving upload reliability and reducing latency for large files.


        **Deprecated: Multipart upload**

        Send the file as `multipart/form-data` with the file in a `file` field. This mode is deprecated and may be removed in a future API version.

        '
      tags:
      - Candidate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                candidateId:
                  allOf:
                  - $ref: '#/paths/~1interviewerPool.addUser/post/requestBody/content/application~1json/schema/properties/userId'
                  - description: The id of the candidate
                fileHandle:
                  type: string
                  description: A handle returned by `file.createFileUploadHandle` after uploading a file to the presigned URL.
              required:
              - candidateId
              - fileHandle
          multipart/form-data:
            schema:
              type: object
              properties:
                candidateId:
                  allOf:
                  - $ref: '#/paths/~1interviewerPool.addUser/post/requestBody/content/application~1json/schema/properties/userId'
                  - description: The id of the candidate
                file:
                  type: string
                  format: binary
                  deprecated: true
                  description: 'Deprecated: Use `file.createFileUploadHandle` with `fileHandle` instead. The file to upload to the candidate''s profile.'
              required:
              - candidateId
              - file
              example:
                candidateId: f9e52a51-a075-4116-a7b8-484deba69004
                file: JVBERi0xLjQKJeLjz9MKMyAwIG9iago8PC9UeXBlL1BhZ2UvUGFyZW50IDIgMCBSL01
      responses:
        '200':
          description: Responses from the candidate.uploadFile endpoint
          content:
            application/json:
              schema:
                oneOf:
                - title: Success response
                  allOf:
                  - $ref: '#/paths/~1job.info/post/responses/200/content/application~1json/schema/oneOf/0/allOf/0'
                  - type: object
                    properties:
                      results:
                        $ref: '#/paths/~1candidate.info/post/responses/200/content/application~1json/schema/oneOf/0/allOf/1/properties/results'
                    required:
                    - results
                - $ref: '#/paths/~1report.generate/post/responses/429/content/application~1json/schema'
