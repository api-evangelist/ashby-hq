                  - $ref: '#/paths/~1interviewerPool.addUser/post/requestBody/content/application~1json/schema/properties/userId'
                fraudStatus:
                  type: string
                  enum:
                  - Fraudulent
                  - NotFraudulent
                  - Unsure
                  description: 'The fraud status to set for the candidate.


                    - `Fraudulent` — Mark the candidate as fraudulent.

                    - `NotFraudulent` — Mark the candidate as not fraudulent (false positive).

                    - `Unsure` — Mark the candidate as unsure, flagged for continued monitoring.

