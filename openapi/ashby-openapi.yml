                  - properties:
                      results:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              allOf:
                              - $ref: '#/paths/~1interviewerPool.addUser/post/requestBody/content/application~1json/schema/properties/userId'
                              - description: The ID of this client information record.
                                example: 7d31034c-790b-4265-bf63-d65396d59d0b
                            ipAddress:
