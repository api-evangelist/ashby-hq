      responses:
        '200':
          description: Responses for the customField.list endpoint
          content:
            application/json:
              schema:
                oneOf:
                - title: Success Response
                  allOf:
                  - $ref: '#/paths/~1job.list/post/responses/200/content/application~1json/schema/oneOf/0/allOf/0'
                  - properties:
                      results:
                        type: array
                        items:
                          $ref: '#/paths/~1customField.info/post/responses/200/content/application~1json/schema/oneOf/0/allOf/1/properties/results'
                  - required:
                    - results
                - $ref: '#/paths/~1report.generate/post/responses/429/content/application~1json/schema'
  /customField.setValue:
    post:
      summary: customField.setValue
      operationId: customFieldSetValue
      description: "Set the value of a custom field for a given object.\n\n**Note:** When updating multiple custom fields on the same object, use\n[`customField.setValues`](#operation/customFieldSetValues) instead to avoid\nrace conditions.\n\n**Note:** To set custom fields on an Employee, use [`user.setCustomFieldValue`](#operation/userSetCustomFieldValue) instead.\n\n**Requires the [`candidatesWrite`](authentication#permissions-customfieldsetvalue) permission.**\n\nThe values accepted in the `fieldValue` param depend on the type of field that's being updated. See below for more details:\n  - Boolean - A boolean value\n  - Date - An ISO Date string\n  - Email, LongText, Phone, String - String\n  - ValueSelect - A string that matches the value of one of the ValueSelect field's options\n  - MultiValueSelect - An array of strings that exist in the MultiValueSelect field's options\n  - Number - A number\n  - Currency - An object with the following properties:\n    - value: A number\n    - currencyCode:\
        \ A valid ISO 4217 currency code\n  - NumberRange - An object with the following properties:\n    - type: \"number-range\"\n    - minValue: A number\n    - maxValue: A number\n  - CompensationRange - An object with the following properties:\n    - type: \"compensation-range\"\n    - minValue: A number\n    - maxValue: A number\n    - currencyCode: A string\n    - interval: A valid interval string\n  - Url - A valid http or https URL (e.g., https://example.com)\n  - UUID - A valid UUID string (e.g., for Employee fields)\n"
      tags:
      - Custom Field
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - objectId
              - objectType
              - fieldId
              - fieldValue
              properties:
                objectId:
                  allOf:
                  - description: The id of the object the field value is being set on.
                  - $ref: '#/paths/~1interviewerPool.addUser/post/requestBody/content/application~1json/schema/properties/userId'
                objectType:
                  type: string
                  description: The type of object the field is associated with.
                  enum:
                  - Application
                  - Candidate
                  - Job
                  - Opening
                fieldId:
                  allOf:
                  - description: The unique id of the Custom Field definition for the field
                  - $ref: '#/paths/~1interviewerPool.addUser/post/requestBody/content/application~1json/schema/properties/userId'
                fieldValue:
                  description: The value to store in the field
                  oneOf:
                  - type: boolean
                    title: Boolean
                    description: A boolean value
                  - type: string
                    title: Date
                    format: date-time
                    description: An ISO Date string
                  - type: string
                    title: String, Email, LongText, Phone
                    description: A string
                  - type: string
                    title: Url
                    format: uri
                    description: A valid http or https URL (e.g., https://example.com)
                  - type: array
                    title: MultiValueSelect
                    items:
                      type: string
                      description: An array of strings that exist in the MultiValueSelect field's options
                  - type: number
                    title: Number
                    description: A number
                  - type: object
                    title: Currency
                    required:
                    - value
                    - currencyCode
                    properties:
                      value:
                        type: number
                        example: 100000
                      currencyCode:
                        type: string
                        example: USD
                    description: An object describing a currency amount
                  - type: string
                    title: ValueSelect
                    description: A string that matches the value of one of the ValueSelect field's options
                  - type: object
                    title: NumberRange
                    required:
                    - type
                    - minValue
                    - maxValue
                    properties:
                      type:
                        type: string
                        example: number-range
                      minValue:
                        type: number
                        example: 10000
                      maxValue:
                        type: number
                        example: 100000
                    description: An object describing the number range
                  - type: string
                    title: UUID
                    format: uuid
                    description: A valid UUID string (e.g., for Employee fields)
                  - type: object
                    title: CompensationRange
                    required:
                    - type
                    - minValue
                    - maxValue
                    - currencyCode
                    - interval
                    properties:
                      type:
                        type: string
                        example: compensation-range
                      minValue:
                        type: number
                        example: 10000
                      maxValue:
                        type: number
                        example: 100000
                      currencyCode:
                        type: string
                        example: USD
                      interval:
                        type: string
                        enum:
                        - NONE
                        - 1 TIME
                        - 1 HOUR
                        - 1 DAY
                        - 1 WEEK
                        - 2 WEEK
                        - 1 MONTH
                        - 2 MONTH
                        - 1 YEAR
                        - 6 MONTH
                        - 0.5 MONTH
                        - 3 MONTH
                        example: 1 YEAR
                    description: An object describing the compensation range
      responses:
        '200':
          description: Responses for the customField.create endpoint
          content:
            application/json:
              schema:
                oneOf:
                - title: Success response
                  allOf:
                  - $ref: '#/paths/~1job.info/post/responses/200/content/application~1json/schema/oneOf/0/allOf/0'
                  - type: object
                    properties:
                      results:
                        type: object
                        properties:
                          id:
                            $ref: '#/paths/~1interviewerPool.addUser/post/requestBody/content/application~1json/schema/properties/userId'
                          isPrivate:
                            type: boolean
                            example: false
                          title:
                            type: string
                          valueLabel:
                            description: The label of the custom field value. This is only present for value select custom fields.
                            oneOf:
                            - type: string
                              title: String
                            - type: array
                              title: MultiValueSelect
                              items:
                                type: string
                          value:
                            oneOf:
                            - type: boolean
                              title: Boolean
                            - type: object
                              title: Currency
                              properties:
                                value:
                                  type: number
                                  example: 1000000
                                  format: currency
                                currencyCode:
                                  type: string
                                  example: USD
                            - type: string
                              title: Date
                              format: date-time
                            - type: string
                              title: String
                            - type: string
                              title: LongText
                            - type: array
                              title: MultiValueSelect
                              items:
                                type: string
                            - type: number
                              title: Number
                            - type: object
                              title: NumberRange
                              properties:
                                type:
                                  type: string
                                  example: number-range
                                minValue:
                                  type: number
                                  example: 10000
                                maxValue:
                                  type: number
                                  example: 100000
                              required:
                              - type
                              - minValue
                              - maxValue
                            - type: object
                              title: CompensationRange
                              properties:
                                type:
                                  type: string
                                  example: compensation-range
                                minValue:
                                  type: number
                                  example: 40000
                                maxValue:
                                  type: number
                                  example: 50000
                                currencyCode:
                                  type: string
                                  example: USD
                                interval:
                                  type: string
                                  enum:
                                  - NONE
                                  - 1 TIME
                                  - 1 HOUR
                                  - 1 DAY
                                  - 1 WEEK
                                  - 2 WEEK
                                  - 1 MONTH
                                  - 2 MONTH
                                  - 1 YEAR
                                  - 6 MONTH
                                  - 0.5 MONTH
                                  - 3 MONTH
                                  example: 1 YEAR
                              required:
                              - type
                              - minValue
                              - maxValue
                              - currencyCode
                              - interval
                            - type: string
                              title: ValueSelect
                        required:
                        - id
                        - title
                        - value
                        examples:
                        - id: 650e5f74-32db-4a0a-b61b-b9afece05023
                          title: Is actively looking
                          value: true
                        - id: 650e5f74-32db-4a0a-b61b-b9afece05024
                          title: Years of experience
                          value: 5
                        - id: 650e5f74-32db-4a0a-b61b-b9afece05025
                          title: Salary expectation
                          value:
                            value: 100000
                            currencyCode: USD
                        - id: 650e5f74-32db-4a0a-b61b-b9afece05026
                          title: Expected start date
                          value: '2022-11-10T19:47:56.795Z'
                    required:
                    - results
                - $ref: '#/paths/~1report.generate/post/responses/429/content/application~1json/schema'
  /customField.setValues:
    post:
      summary: customField.setValues
      operationId: customFieldSetValues
      description: "Set the values of multiple custom fields for a given object in a single call.\nThis is the recommended approach when updating multiple fields on the same object\nto avoid race conditions that can occur with concurrent `customField.setValue` calls.\n\n**Note:** To set custom fields on an Employee, use [`user.setCustomFieldValues`](#operation/userSetCustomFieldValues) instead.\n\n**Requires the [`candidatesWrite`](authentication#permissions-customfieldsetvalues) permission.**\n\nThe values accepted in the `fieldValue` param depend on the type of field that's being updated. See below for more details:\n  - Boolean - A boolean value\n  - Date - An ISO Date string\n  - Email, LongText, Phone, String - String\n  - ValueSelect - A string that matches the value of one of the ValueSelect field's options\n  - MultiValueSelect - An array of strings that exist in the MultiValueSelect field's options\n  - Number - A number\n  - Currency - An object with the following properties:\n\
        \    - value: A number\n    - currencyCode: A valid ISO 4217 currency code\n  - NumberRange - An object with the following properties:\n    - type: \"number-range\"\n    - minValue: A number\n    - maxValue: A number\n  - CompensationRange - An object with the following properties:\n    - type: \"compensation-range\"\n    - minValue: A number\n    - maxValue: A number\n    - currencyCode: A string\n    - interval: A valid interval string\n  - Url - A valid http or https URL (e.g., https://example.com)\n  - UUID - A valid UUID string (e.g., for Employee fields)\n"
      tags:
      - Custom Field
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - objectId
              - objectType
              - values
              properties:
                objectId:
                  allOf:
                  - description: The id of the object the field values are being set on.
                  - $ref: '#/paths/~1interviewerPool.addUser/post/requestBody/content/application~1json/schema/properties/userId'
                objectType:
                  type: string
                  description: The type of object the fields are associated with.
                  enum:
                  - Application
                  - Candidate
                  - Job
                  - Opening
                values:
                  type: array
                  description: Array of custom field updates to apply
                  minItems: 1
                  items:
                    type: object
                    required:
                    - fieldId
                    - fieldValue
                    properties:
                      fieldId:
                        allOf:
                        - description: The unique id of the Custom Field definition for the field
                        - $ref: '#/paths/~1interviewerPool.addUser/post/requestBody/content/application~1json/schema/properties/userId'
                      fieldValue:
                        description: The value to store in the field
                        oneOf:
                        - type: boolean
                          title: Boolean
                          description: A boolean value
                        - type: string
                          title: Date
                          format: date-time
                          description: An ISO Date string
                        - type: string
                          title: String, Email, LongText, Phone
                          description: A string
                        - type: string
                          title: Url
                          format: uri
                          description: A valid http or https URL (e.g., https://example.com)
                        - type: array
                          title: MultiValueSelect
                          items:
                            type: string
                            description: An array of strings that exist in the MultiValueSelect field's options
                        - type: number
                          title: Number
                          description: A number
                        - type: object
                          title: Currency
                          required:
                          - value
                          - currencyCode
                          properties:
                            value:
                              type: number
                              example: 100000
                            currencyCode:
                              type: string
                              example: USD
                          description: An object describing a currency amount
                        - type: string
                          title: ValueSelect
                          description: A string that matches the value of one of the ValueSelect field's options
                        - type: object
                          title: NumberRange
                          required:
                          - type
                          - minValue
                          - maxValue
                          properties:
                            type:
                              type: string
                              example: number-range
                            minValue:
                              type: number
                              example: 10000
                            maxValue:
                              type: number
                              example: 100000
                          description: An object describing the number range
                        - type: string
                          title: UUID
                          format: uuid
                          description: A valid UUID string (e.g., for Employee fields)
                        - type: object
                          title: CompensationRange
                          required:
                          - type
                          - minValue
                          - maxValue
                          - currencyCode
                          - interval
                          properties:
                            type:
                              type: string
                              example: compensation-range
                            minValue:
                              type: number
                              example: 10000
                            maxValue:
                              type: number
                              example: 100000
                            currencyCode:
                              type: string
                              example: USD
                            interval:
                              type: string
                              enum:
                              - NONE
                              - 1 TIME
                              - 1 HOUR
                              - 1 DAY
                              - 1 WEEK
                              - 2 WEEK
                              - 1 MONTH
                              - 2 MONTH
                              - 1 YEAR
                              - 6 MONTH
                              - 0.5 MONTH
                              - 3 MONTH
                              example: 1 YEAR
                          description: An object describing the compensation range
      responses:
        '200':
          description: Responses for the customField.setValues endpoint
          content:
            application/json:
              schema:
                oneOf:
                - title: Success response
                  allOf:
                  - $ref: '#/paths/~1job.info/post/responses/200/content/application~1json/schema/oneOf/0/allOf/0'
                  - type: object
                    properties:
                      results:
                        type: array
                        items:
                          $ref: '#/paths/~1customField.setValue/post/responses/200/content/application~1json/schema/oneOf/0/allOf/1/properties/results'
                    required:
                    - results
                - $ref: '#/paths/~1report.generate/post/responses/429/content/application~1json/schema'
  /customField.updateSelectableValues:
    post:
      summary: customField.updateSelectableValues
      operationId: customFieldUpdateSelectableValues
      description: 'Update the selectable values for a custom field


        This endpoint merges the provided selectable values with the existing values for a custom field.


        **Merge behavior:**

        - **New values** (values not present in the existing values) are added to the field

        - **Existing values** (matching by `value` field) have their `label` updated and `isArchived` status set from the request

        - **Omitted values** (existing values not included in the request) are marked as archived

        - Metadata such as substitution tokens are preserved for existing values


        The `isArchived` field defaults to `false` if not provided.


        **Requires the [`hiringProcessMetadataWrite`](authentication#permissions-customfieldupdateselectablevalues) permission.**

        '
      tags:
      - Custom Field
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
              - customFieldId
              - selectableValues
              properties:
                customFieldId:
                  type: string
                  format: uuid
                  description: The id of the custom field to update
                selectableValues:
                  type: array
                  description: An array of selectable values to merge with the existing values. Only `label`, `value`, and optionally `isArchived` should be provided.
                  items:
                    type: object
                    additionalProperties: false
                    required:
                    - label
                    - value
                    properties:
                      label:
                        type: string
                        description: The display label for this selectable value
                      value:
                        type: string
                        description: The internal value for this selectable value (used as the unique identifier)
                      isArchived:
                        type: boolean
                        description: Whether this value should be archived. Defaults to false if not provided.
                        default: false
      responses:
        '200':
          description: Responses for the customField.updateSelectableValues endpoint
          content:
            application/json:
              schema:
                oneOf:
                - title: Success response
                  allOf:
                  - $ref: '#/paths/~1job.info/post/responses/200/content/application~1json/schema/oneOf/0/allOf/0'
                  - type: object
                    properties:
                      results:
                        $ref: '#/paths/~1customField.info/post/responses/200/content/application~1json/schema/oneOf/0/allOf/1/properties/results'
                    required:
                    - results
                - $ref: '#/paths/~1report.generate/post/responses/429/content/application~1json/schema'
  /file.info:
