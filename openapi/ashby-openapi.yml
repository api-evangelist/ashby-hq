  /candidate.listFraudChecks:
    post:
      summary: candidate.listFraudChecks
      operationId: candidateListFraudChecks
      description: 'Fetches a paginated list of fraud checks for a candidate, including the fraud signals detected in each check.


        Each fraud check contains a list of fraud signals with their category, name, description, and optional value.


        **Field Stability:**

        - `id` fields are stable and will not change.

        - `category`, `name`, `description`, and `value` fields on fraud signals are unstable and may change as signals are added, renamed, or recategorized.


        This endpoint supports pagination only (not incremental sync). See the [Pagination and Incremental Synchronization](/docs/pagination-and-incremental-sync) guide for usage examples.


        **Requires the [`candidatesRead`](authentication#permissions-candidatelistfraudchecks) permission.**


        **Note:** This endpoint requires Fraud Detection feature to be enabled for your organization.

        '
      tags:
      - Candidate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
              - type: object
                properties:
                  candidateId:
                    allOf:
                    - description: The id of the candidate to fetch fraud checks for.
                    - $ref: '#/paths/~1interviewerPool.addUser/post/requestBody/content/application~1json/schema/properties/userId'
              - $ref: '#/paths/~1brand.list/post/requestBody/content/application~1json/schema'
              required:
              - candidateId
      responses:
        '200':
          description: Responses for the candidate.listFraudChecks endpoint
          content:
            application/json:
              schema:
                oneOf:
                - allOf:
                  - $ref: '#/paths/~1brand.list/post/responses/200/content/application~1json/schema/oneOf/0/allOf/0'
                  - type: object
                    properties:
                      results:
                        type: array
                        items:
                          type: object
                          title: Fraud Check
                          description: A fraud check performed on a candidate, containing the fraud signals that were detected.
                          properties:
                            id:
                              allOf:
                              - $ref: '#/paths/~1interviewerPool.addUser/post/requestBody/content/application~1json/schema/properties/userId'
                              - description: The unique identifier of this fraud check.
                            candidateId:
                              allOf:
                              - $ref: '#/paths/~1interviewerPool.addUser/post/requestBody/content/application~1json/schema/properties/userId'
                              - description: The id of the candidate this fraud check belongs to.
                            applicationId:
                              type:
                              - string
                              - 'null'
                              format: uuid
                              description: The id of the application this fraud check is associated with, if any.
                              example: f5b1e9a2-3c4d-4e5f-9a0b-1c2d3e4f5a6b
                            createdAt:
                              type: string
                              format: date-time
                              description: When this fraud check was performed.
                              example: '2025-01-15T10:30:00.000Z'
                            fraudSignals:
                              type: array
                              description: The fraud signals detected during this fraud check.
                              items:
                                type: object
                                title: Fraud Signal
                                description: A fraud signal detected during a candidate fraud check.
                                properties:
                                  id:
                                    allOf:
                                    - $ref: '#/paths/~1interviewerPool.addUser/post/requestBody/content/application~1json/schema/properties/userId'
                                    - description: The unique identifier of this fraud signal instance.
                                  category:
                                    type: string
                                    description: 'The category of the fraud signal. Possible values include "Social", "Automation", "Geographic", and "Spoofing".


                                      **Note:** This field is unstable and may change over time.

                                      '
                                    example: Spoofing
                                  name:
                                    type: string
                                    description: 'A human-readable name for this fraud signal.


                                      **Note:** This field is unstable and may change over time.

                                      '
                                    example: VPN Connection Detected
                                  description:
                                    type: string
                                    description: 'A description of what this fraud signal means.


                                      **Note:** This field is unstable and may change over time.

                                      '
                                    example: Applicant is hiding their real location using a VPN.
                                  value:
                                    type: string
                                    description: 'An optional value associated with this signal, providing additional context (e.g., location information, account counts).

                                      Only present when a value exists for the signal.


                                      **Note:** This field is unstable and may change over time.

                                      '
                                    example: Copenhagen, DK
                                required:
                                - id
                                - category
                                - name
                                - description
                          required:
                          - id
                          - candidateId
                          - applicationId
                          - createdAt
                          - fraudSignals
                    required:
                    - results
                - $ref: '#/paths/~1report.generate/post/responses/429/content/application~1json/schema'
  /candidate.setFraudStatus:
    post:
      summary: candidate.setFraudStatus
      operationId: candidateSetFraudStatus
      description: 'This endpoint allows marking candidates as fraudulent, not fraudulent, or unsure after reviewing their fraud signals via `candidate.listFraudChecks`.


        **Requires the [`candidatesWrite`](authentication#permissions-candidatesetfraudstatus) permission.**


        **Note:** This endpoint requires the Fraud Detection feature to be enabled for your organization.

        '
      tags:
      - Candidate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                candidateId:
                  allOf:
                  - description: The id of the candidate to set the fraud status for.
                  - $ref: '#/paths/~1interviewerPool.addUser/post/requestBody/content/application~1json/schema/properties/userId'
                fraudStatus:
                  type: string
                  enum:
                  - Fraudulent
                  - NotFraudulent
                  - Unsure
                  description: "The fraud status to set for the candidate.\n\n- `Fraudulent` \u2014 Mark the candidate as fraudulent.\n- `NotFraudulent` \u2014 Mark the candidate as not fraudulent (false positive).\n- `Unsure` \u2014 Mark the candidate as unsure, flagged for continued monitoring.\n"
                  example: Fraudulent
              required:
              - candidateId
              - fraudStatus
      responses:
        '200':
          description: Responses for the candidate.setFraudStatus endpoint
          content:
            application/json:
              schema:
                oneOf:
                - title: Success response
                  allOf:
                  - $ref: '#/paths/~1job.info/post/responses/200/content/application~1json/schema/oneOf/0/allOf/0'
                  - type: object
                    properties:
                      results:
                        $ref: '#/paths/~1candidate.info/post/responses/200/content/application~1json/schema/oneOf/0/allOf/1/properties/results'
                    required:
                    - results
                - $ref: '#/paths/~1report.generate/post/responses/429/content/application~1json/schema'
