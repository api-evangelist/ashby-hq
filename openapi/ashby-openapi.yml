                    allOf:
                    - $ref: '#/paths/~1interviewerPool.addUser/post/requestBody/content/application~1json/schema/properties/userId'
                    - description: The id of the candidate to fetch client info for
              - $ref: '#/paths/~1surveyFormDefinition.list/post/requestBody/content/application~1json/schema'
              required:
              - candidateId
              example:
                candidateId: f9e52a51-a075-4116-a7b8-484deba69004
      responses:
        '200':
          description: Responses for the candidate.listClientInfo endpoint
          content:
            application/json:
              schema:
                oneOf:
