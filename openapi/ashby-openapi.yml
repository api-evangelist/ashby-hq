                          phoneNumbers:
                            type: array
                            items:
                              $ref: '#/webhooks/pushToHRIS/post/requestBody/content/application~1json/schema/properties/data/properties/application/properties/candidate/properties/primaryEmailAddress'
                          socialLinks:
