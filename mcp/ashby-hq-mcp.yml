description: >-
  Ashby's official hosted/remote MCP server connects MCP-compatible AI clients
  directly to live recruiting data. Tool list below is transcribed from Ashby's
  MCP docs (Open Beta), grouped by capability area. Names are descriptive of the
  documented capability rather than exact registered tool identifiers.
tools:
- name: search_records
  description: Search records by name across candidates, jobs, applications, and email templates.
- name: filter_records
  description: Filter records with criteria across candidates, applications, jobs, postings, openings, interviews, and offers.
- name: get_record_details
  description: Retrieve the full details of a specific record.
- name: get_candidate_profile
  description: Get candidate profile information.
- name: get_upcoming_interviews
  description: List a user's upcoming interviews.
- name: get_interview_details
  description: Get interview details, including the prep briefing.
- name: get_interview_plan
  description: Get the interview plan and its stages.
- name: get_submitted_feedback
  description: Retrieve submitted interview feedback.
- name: get_job_pipeline
  description: Get the pipeline status for a job.
- name: get_pending_tasks
  description: Get pending tasks (scorecards, approvals, follow-ups).
- name: create_candidate
  description: Create a new candidate record.
- name: add_candidate_note
  description: Add a note to a candidate.
- name: change_application_stage
  description: Move an application to a different interview stage.
- name: consider_candidate_for_job
  description: Consider an existing candidate for an open job.
- name: search_documentation
  description: Search Ashby product documentation.
- name: submit_mcp_feedback
  description: Submit feedback about the MCP server.
