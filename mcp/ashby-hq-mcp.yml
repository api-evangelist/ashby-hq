server:
  name: ashby
  transport: http
  url: https://mcp.ashbyhq.com/mcp/v1
  auth:
    type: oauth2
    description: >-
      Each user completes their own OAuth flow. The server only returns data and
      permits actions the connecting user is already allowed to perform in Ashby
      (per-user permission enforcement, not an org-wide token).
  enablement: >-
    An org admin must opt in: Admin > Organization Setup > Opt In Features > turn on
    "MCP server". Available on Foundations, Legacy, Plus, and Plus Enterprise plans;
    not available to analytics-only organizations.
  clients:
  - ChatGPT
