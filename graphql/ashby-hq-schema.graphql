"""
Ashby HQ GraphQL Schema
Conceptual GraphQL representation of the Ashby recruiting platform API.
Based on the Ashby REST API surface at https://developers.ashbyhq.com
Covers Applications, Candidates, Jobs, Openings, Interviews, Offers, Approvals,
Surveys, Assessments, Custom Fields, Organization, Files, Reports, Webhooks, and API Keys.
"""

scalar DateTime
scalar JSON
scalar Upload

# ─────────────────────────────────────────────
# Enums
# ─────────────────────────────────────────────

enum JobStatus {
  OPEN
  CLOSED
  ARCHIVED
  DRAFT
}

enum ApplicationStatus {
  ACTIVE
  ARCHIVED
  HIRED
  REJECTED
}

enum OfferStatus {
  DRAFT
  PENDING_APPROVAL
  APPROVED
  SENT
  ACCEPTED
  DECLINED
  RESCINDED
  EXPIRED
}

enum InterviewScheduleStatus {
  SCHEDULED
  CANCELLED
  COMPLETED
}

enum ApprovalStatus {
  PENDING
  APPROVED
  REJECTED
  SKIPPED
}

enum WebhookEventType {
  APPLICATION_SUBMIT
  APPLICATION_UPDATE
  CANDIDATE_DELETE
  CANDIDATE_HIRE
  CANDIDATE_MERGE
  CANDIDATE_STAGE_CHANGE
  INTERVIEW_PLAN_TRANSITION
  INTERVIEW_SCHEDULE_CREATE
  INTERVIEW_SCHEDULE_UPDATE
  JOB_CREATE
  JOB_UPDATE
  JOB_POSTING_PUBLISH
  JOB_POSTING_UNPUBLISH
  JOB_POSTING_UPDATE
  OFFER_CREATE
  OFFER_DELETE
  OFFER_UPDATE
  OPENING_CREATE
  PING
  PUSH_TO_HRIS
  SIGNATURE_REQUEST_UPDATE
  SURVEY_SUBMIT
}

enum CustomFieldType {
  TEXT
  NUMBER
  DATE
  BOOLEAN
  SELECT
  MULTI_SELECT
  URL
  PERSON
}

enum CustomFieldEntity {
  APPLICATION
  CANDIDATE
  JOB
  OPENING
  OFFER
}

enum PermissionModule {
  JOBS
  CANDIDATES
  INTERVIEWS
  OFFERS
  APPROVALS
  ORGANIZATION
  REPORTS
  API_KEYS
}

enum PermissionScope {
  READ
  WRITE
}

enum EmploymentType {
  FULL_TIME
  PART_TIME
  CONTRACT
  INTERNSHIP
}

enum CompensationInterval {
  HOURLY
  DAILY
  WEEKLY
  BIWEEKLY
  MONTHLY
  ANNUALLY
}

enum AssessmentStatus {
  NOT_STARTED
  IN_PROGRESS
  COMPLETED
  CANCELLED
}

enum SurveyStatus {
  PENDING
  SUBMITTED
  EXPIRED
}

enum ReportFormat {
  CSV
  JSON
}

enum ReportStatus {
  PENDING
  RUNNING
  COMPLETE
  FAILED
}

enum OpeningStatus {
  OPEN
  CLOSED
  ARCHIVED
}

enum FraudCheckStatus {
  CLEAR
  FLAGGED
  NOT_RUN
}

# ─────────────────────────────────────────────
# Scalar and support types
# ─────────────────────────────────────────────

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
  nextSyncToken: String
}

type Address {
  street1: String
  street2: String
  city: String
  state: String
  postalCode: String
  country: String
  countryCode: String
}

type CompensationRange {
  minValue: Float
  maxValue: Float
  currency: String
  interval: CompensationInterval
}

type SourceTrackingLink {
  id: ID!
  url: String!
  source: Source
  referralForm: ReferralForm
  createdAt: DateTime!
}

# ─────────────────────────────────────────────
# Organization
# ─────────────────────────────────────────────

type Organization {
  id: ID!
  name: String!
  slug: String
  logoUrl: String
  websiteUrl: String
  createdAt: DateTime!
  updatedAt: DateTime!
}

type User {
  id: ID!
  firstName: String!
  lastName: String!
  email: String!
  globalRole: String
  isEnabled: Boolean!
  isEmailVerified: Boolean!
  permissionModules: [PermissionModuleGrant!]
  createdAt: DateTime!
  updatedAt: DateTime!
}

type PermissionModuleGrant {
  module: PermissionModule!
  scope: PermissionScope!
}

type Department {
  id: ID!
  name: String!
  parentDepartment: Department
  childDepartments: [Department!]
  jobs: [Job!]
  createdAt: DateTime!
  updatedAt: DateTime!
}

type Location {
  id: ID!
  name: String!
  address: Address
  isRemote: Boolean!
  parentLocation: Location
  childLocations: [Location!]
  createdAt: DateTime!
  updatedAt: DateTime!
}

type Brand {
  id: ID!
  name: String!
  logoUrl: String
  websiteUrl: String
  careersPageUrl: String
  createdAt: DateTime!
  updatedAt: DateTime!
}

type Source {
  id: ID!
  name: String!
  isArchived: Boolean!
}

type ArchiveReason {
  id: ID!
  name: String!
  reasonType: String
  isArchived: Boolean!
}

type CloseReason {
  id: ID!
  name: String!
  isArchived: Boolean!
}

type CommunicationTemplate {
  id: ID!
  name: String!
  subject: String
  body: String!
  templateType: String
  createdAt: DateTime!
  updatedAt: DateTime!
}

type HiringTeamRole {
  id: ID!
  name: String!
  description: String
}

type HiringTeamMember {
  id: ID!
  user: User!
  role: HiringTeamRole!
  job: Job
}

type ReferralForm {
  id: ID!
  name: String!
  url: String!
  isArchived: Boolean!
}

# ─────────────────────────────────────────────
# Candidate
# ─────────────────────────────────────────────

type Candidate {
  id: ID!
  name: String!
  firstName: String
  lastName: String
  email: String
  phoneNumber: String
  linkedInUrl: String
  githubUrl: String
  websiteUrl: String
  company: String
  title: String
  location: String
  timezone: String
  isAnonymized: Boolean!
  fraudCheckStatus: FraudCheckStatus
  source: Source
  sourceTrackingLink: SourceTrackingLink
  tags: [CandidateTag!]
  applications: [Application!]
  notes: [CandidateNote!]
  files: [File!]
  customFields: [CustomFieldValue!]
  createdAt: DateTime!
  updatedAt: DateTime!
}

type CandidateTag {
  id: ID!
  name: String!
  isArchived: Boolean!
}

type CandidateNote {
  id: ID!
  candidate: Candidate!
  author: User
  content: String!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type CandidateProject {
  id: ID!
  candidate: Candidate!
  name: String!
  description: String
  members: [User!]
  createdAt: DateTime!
  updatedAt: DateTime!
}

type CandidateSequence {
  id: ID!
  candidate: Candidate!
  sequenceName: String!
