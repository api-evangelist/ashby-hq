- type: Features
  data:
  - All-in-one recruiting platform — ATS + CRM/sourcing + scheduling + analytics +
    AI Notetaker in a single product
  - 164 REST operations across 14 product modules — Applications, Candidates, Jobs,
    Openings, Job Postings, Interviews, Offers, Approvals, Surveys, Assessments, Custom
    Fields, Organization, Files, Reports, Webhooks, API Keys
  - HTTP Basic Auth with API key as username — keys are scoped to read/write modules
    (Jobs, Candidates, Interviews, Offers, Approvals, Organization, Reports, API Keys)
  - 22 outbound webhook event types — HMAC-SHA256 signed via Ashby-Signature header
    — with automatic retries and related-webhook ordering guarantees
  - AI Application Review — application.listCriteriaEvaluations exposes AI-generated
    criteria scoring with outcome and reasoning per candidate against job requirements
  - AI Notetaker — notetakerTranscript.info surfaces live interview transcripts and
    AI-drafted structured feedback for reviewers
  - Pagination and incremental sync via syncToken — most list endpoints return a sync
    cursor for delta polling
  - Expansions — request related entities inline (jobs include departments, locations;
    applications include candidates, jobs) via the expand request parameter
  - Endpoint naming convention — resource.verb (e.g., application.list, candidate.create)
    over POST with JSON body; not REST-pure but stable and consistent across 164 operations
  - Async Reports API — generate analytics reports at 15 req/min / 3 concurrent; powers
    Ashby Analytics standalone product
  - Public, unauthenticated job postings API for custom careers pages — drives Ashby-hosted
    and self-hosted careers experiences
  - Dedicated partner job feeds — pre-built integrations with LinkedIn, Indeed, ZipRecruiter,
    Otta, Built In, Levels.fyi via the public job postings surface
  - Push to HRIS — pushToHRIS webhook and pushToHRIS API trigger handoff to Workday,
    Rippling, Gusto, HiBob, Deel, Paylocity, BambooHR after candidate hire
  - 200+ integration partners across HRIS, assessments (SHL, CodeSignal, HackerRank,
    CoderPad), background checks (HireRight, Checkr), video (Zoom), comms (Slack,
    Google Workspace, Microsoft 365), and contract / offer letter tools (Pave, Ironclad,
    Metaview)
  - Zapier connector for low-code workflows
  - Custom fields data model — define, list, set values (single and batch), update
    selectable values — drives structured-hiring data extensibility
  - Approval definitions API for governance — manage multi-step approval workflows
    on offers and other entities; supports force-approve overrides
  - Candidate fraud check status surfaced via candidate.info / candidate.list
  - File upload via two-step presigned URL — request URL, PUT bytes — keeps binary
    payloads off the API plane
  - llms.txt index at developers.ashbyhq.com/llms.txt — every operation page exposes
    its OpenAPI definition inline in a fenced JSON block
  - ReadMe-hosted developer portal with API Reference, Guides, Webhooks, Changelog,
    and Try It console
