position: Consuming
description: Ashby is a modern all-in-one recruiting platform combining Applicant
  Tracking System (ATS), sourcing/CRM, interview scheduling, structured-hiring workflows,
  and recruiting analytics with AI embedded throughout — including AI Application
  Review for criteria scoring and an AI Notetaker for interview transcripts and structured
  feedback. The Ashby API exposes 164 operations across 14 product modules with HTTP
  Basic Auth, 22 webhook event types, async reporting, public job postings for custom
  careers pages, and partner-implemented assessment integrations. Customers include
  Deel, Snowflake, Shopify, Notion, Linear, Zapier, and Replit; pricing spans Foundations
  ($400/mo flat for sub-100 employees), Plus, and Enterprise tiers, plus a standalone
  Ashby Analytics product layered on existing ATS deployments.
