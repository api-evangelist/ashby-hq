naftiko: 1.0.0-alpha2
info:
  label: "Ashby \u2014 Webhooks"
  description: Ashby Webhooks capability. Manage outbound webhook subscriptions for 22 event types.
  tags:
  - Ashby
  - Recruiting
  - ATS
  - Webhooks
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    ASHBY_API_KEY: ASHBY_API_KEY
capability:
  consumes:
  - type: http
    namespace: webhooks-webhooks
    baseUri: https://api.ashbyhq.com
    description: Ashby Webhooks capability. Manage outbound webhook subscriptions for 22 event types. Backed by the Ashby public REST API.
    resources:
    - name: webhook-create
      path: /webhook.create
      operations:
      - name: webhook-create
        method: POST
        description: Create a webhook subscription
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON). See https://developers.ashbyhq.com/reference for the schema of each operation.
          required: false
        headers:
        - name: Accept
          value: application/json; version=1
        - name: Content-Type
          value: application/json
    - name: webhook-update
      path: /webhook.update
      operations:
      - name: webhook-update
        method: POST
        description: Update a webhook subscription
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON). See https://developers.ashbyhq.com/reference for the schema of each operation.
          required: false
        headers:
        - name: Accept
          value: application/json; version=1
        - name: Content-Type
          value: application/json
    - name: webhook-info
      path: /webhook.info
      operations:
      - name: webhook-info
        method: POST
        description: Get webhook info
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON). See https://developers.ashbyhq.com/reference for the schema of each operation.
          required: false
        headers:
        - name: Accept
          value: application/json; version=1
        - name: Content-Type
          value: application/json
    - name: webhook-delete
      path: /webhook.delete
      operations:
      - name: webhook-delete
        method: POST
        description: Delete a webhook subscription
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON). See https://developers.ashbyhq.com/reference for the schema of each operation.
          required: false
        headers:
        - name: Accept
          value: application/json; version=1
        - name: Content-Type
          value: application/json
    authentication:
      type: basic
      username: '{{env.ASHBY_API_KEY}}'
      password: ''
      description: 'HTTP Basic Auth: Ashby API key as username, blank password.'
  exposes:
  - type: rest
    namespace: webhooks-webhooks-rest
    port: 8080
    description: "REST adapter for Ashby \u2014 Webhooks. One Spectral-compliant resource per consumed operation, prefixed with /v1."
    resources:
    - path: /v1/webhook.create
      name: webhook-create
      description: REST surface for webhook-create.
      operations:
      - method: POST
        name: webhook-create
        description: Create a webhook subscription
        call: webhooks-webhooks.webhook-create
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/webhook.update
      name: webhook-update
      description: REST surface for webhook-update.
      operations:
      - method: POST
        name: webhook-update
        description: Update a webhook subscription
        call: webhooks-webhooks.webhook-update
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/webhook.info
      name: webhook-info
      description: REST surface for webhook-info.
      operations:
      - method: POST
        name: webhook-info
        description: Get webhook info
        call: webhooks-webhooks.webhook-info
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/webhook.delete
      name: webhook-delete
      description: REST surface for webhook-delete.
      operations:
      - method: POST
        name: webhook-delete
        description: Delete a webhook subscription
        call: webhooks-webhooks.webhook-delete
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: webhooks-webhooks-mcp
    port: 9090
    transport: http
    description: "MCP adapter for Ashby \u2014 Webhooks. One tool per consumed operation, routed inline through this capability's consumes block."
    tools:
    - name: ashby-webhook-create
      description: Create a webhook subscription
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: webhooks-webhooks.webhook-create
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: ashby-webhook-update
      description: Update a webhook subscription
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: webhooks-webhooks.webhook-update
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: ashby-webhook-info
      description: Get webhook info
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: webhooks-webhooks.webhook-info
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: ashby-webhook-delete
      description: Delete a webhook subscription
      hints:
        readOnly: false
        destructive: true
        idempotent: false
      call: webhooks-webhooks.webhook-delete
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
