naftiko: 1.0.0-alpha2
info:
  label: "Ashby \u2014 Interview Schedules"
  description: Ashby Interview Scheduling capability. Create, update, cancel, and list interview schedules.
  tags:
  - Ashby
  - Recruiting
  - ATS
  - Interview Schedules
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    ASHBY_API_KEY: ASHBY_API_KEY
capability:
